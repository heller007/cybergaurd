<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CyberGaurd — Report Classifier</title>
  <style>
    :root {
      --bg: #0f1419;
      --surface: #1a2332;
      --border: #2d3a4f;
      --text: #e7ecf3;
      --muted: #8b9cb3;
      --accent: #3b82f6;
      --accent-dim: #2563eb;
      --user-bubble: #1e3a5f;
      --bot-bubble: #1e293b;
      --success: #22c55e;
      --radius: 12px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    header h1 {
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    header p {
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: 0.2rem;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      max-width: 720px;
      width: 100%;
      margin: 0 auto;
    }

    .msg {
      max-width: 92%;
      padding: 0.75rem 1rem;
      border-radius: var(--radius);
      line-height: 1.5;
      font-size: 0.95rem;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .msg.user {
      align-self: flex-end;
      background: var(--user-bubble);
      border-bottom-right-radius: 4px;
    }

    .msg.bot {
      align-self: flex-start;
      background: var(--bot-bubble);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }

    .msg.bot .label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin-bottom: 0.35rem;
    }

    .verdict {
      font-weight: 600;
      font-size: 1rem;
      margin-bottom: 0.35rem;
    }

    .confidence {
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 0.75rem;
    }

    .confidence-bar {
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin-bottom: 1rem;
      overflow: hidden;
    }

    .confidence-bar span {
      display: block;
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
    }

    .override {
      margin-top: 0.5rem;
    }

    .override label {
      display: block;
      font-size: 0.75rem;
      color: var(--muted);
      margin-bottom: 0.35rem;
    }

    select {
      width: 100%;
      padding: 0.5rem 0.65rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-size: 0.85rem;
      margin-bottom: 0.65rem;
    }

    .btn-row {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    button {
      cursor: pointer;
      border: none;
      border-radius: 8px;
      font-size: 0.85rem;
      padding: 0.5rem 0.9rem;
      font-weight: 500;
    }

    button.primary {
      background: var(--accent);
      color: #fff;
    }

    button.primary:hover { background: var(--accent-dim); }

    button.secondary {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .hint {
      align-self: center;
      color: var(--muted);
      font-size: 0.85rem;
      text-align: center;
      padding: 2rem 1rem;
    }

    .error {
      color: #f87171;
      font-size: 0.85rem;
      margin-top: 0.5rem;
    }

    .toast {
      position: fixed;
      bottom: 5.5rem;
      left: 50%;
      transform: translateX(-50%);
      background: var(--success);
      color: #052e16;
      padding: 0.5rem 1rem;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 500;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
    }

    .toast.show { opacity: 1; }

    footer {
      border-top: 1px solid var(--border);
      background: var(--surface);
      padding: 0.75rem 1rem 1rem;
    }

    .composer {
      max-width: 720px;
      margin: 0 auto;
      display: flex;
      gap: 0.5rem;
      align-items: flex-end;
    }

    textarea {
      flex: 1;
      resize: none;
      min-height: 44px;
      max-height: 160px;
      padding: 0.65rem 0.85rem;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-family: inherit;
      font-size: 0.95rem;
      line-height: 1.4;
    }

    textarea:focus {
      outline: none;
      border-color: var(--accent);
    }

    textarea::placeholder { color: var(--muted); }

    #send {
      height: 44px;
      min-width: 72px;
      background: var(--accent);
      color: #fff;
      border-radius: var(--radius);
    }

    #send:hover:not(:disabled) { background: var(--accent-dim); }
  </style>
</head>
<body>
  <header>
    <h1>CyberGaurd</h1>
    <p>Paste a cyber-crime complaint — get a suggested category, or pick another from the list.</p>
  </header>

  <main id="chat">
    <p class="hint">Describe the incident in Hinglish or English, then press Classify.</p>
  </main>

  <div class="toast" id="toast"></div>

  <footer>
    <form class="composer" id="form">
      <textarea
        id="input"
        rows="1"
        placeholder="e.g. UPI fraud — money debited without OTP..."
        autocomplete="off"
      ></textarea>
      <button type="submit" class="primary" id="send">Classify</button>
    </form>
  </footer>

  <script>
    const chat = document.getElementById("chat");
    const form = document.getElementById("form");
    const input = document.getElementById("input");
    const sendBtn = document.getElementById("send");
    const toast = document.getElementById("toast");

    let classes = [];

    input.addEventListener("input", () => {
      input.style.height = "auto";
      input.style.height = Math.min(input.scrollHeight, 160) + "px";
    });

    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        form.requestSubmit();
      }
    });

    function showToast(msg) {
      toast.textContent = msg;
      toast.classList.add("show");
      setTimeout(() => toast.classList.remove("show"), 2200);
    }

    function addUserBubble(text) {
      const hint = chat.querySelector(".hint");
      if (hint) hint.remove();
      const el = document.createElement("div");
      el.className = "msg user";
      el.textContent = text;
      chat.appendChild(el);
      chat.scrollTop = chat.scrollHeight;
    }

    function pct(n) {
      return (n * 100).toFixed(1) + "%";
    }

    function addBotBubble(data) {
      const el = document.createElement("div");
      el.className = "msg bot";

      const conf = data.confidence;
      const options = (data.classes || classes)
        .map((c, i) => `<option value="${i}" ${i === data.label_id ? "selected" : ""}>${c}</option>`)
        .join("");

      el.innerHTML = `
        <div class="label">Suggested category</div>
        <div class="verdict">${escapeHtml(data.suggested_category)}</div>
        <div class="confidence">Confidence: ${pct(conf)}</div>
        <div class="confidence-bar"><span style="width:${Math.round(conf * 100)}%"></span></div>
        <div class="override">
          <label for="cat-${data._id}">Not right? Choose the correct category</label>
          <select id="cat-${data._id}">${options}</select>
          <div class="btn-row">
            <button type="button" class="primary confirm-btn">Confirm category</button>
          </div>
          <p class="error" hidden></p>
        </div>
      `;

      const select = el.querySelector("select");
      const errEl = el.querySelector(".error");
      const confirmBtn = el.querySelector(".confirm-btn");

      confirmBtn.addEventListener("click", async () => {
        const selectedIdx = parseInt(select.value, 10);
        const selectedCategory = classes[selectedIdx] || select.options[select.selectedIndex].text;
        confirmBtn.disabled = true;
        errEl.hidden = true;

        try {
          const res = await fetch("/api/feedback", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              text: data.text,
              suggested_category: data.suggested_category,
              suggested_label_id: data.label_id,
              selected_category: selectedCategory,
              selected_label_id: selectedIdx,
              confidence: data.confidence,
            }),
          });
          if (!res.ok) throw new Error(await res.text());
          const overridden = data.suggested_category !== selectedCategory;
          showToast(overridden ? "Correction saved" : "Category confirmed");
          el.querySelector(".verdict").textContent = selectedCategory;
        } catch (e) {
          errEl.textContent = "Could not save. Try again.";
          errEl.hidden = false;
          confirmBtn.disabled = false;
        }
      });

      chat.appendChild(el);
      chat.scrollTop = chat.scrollHeight;
    }

    function escapeHtml(s) {
      const d = document.createElement("div");
      d.textContent = s;
      return d.innerHTML;
    }

    async function loadClasses() {
      try {
        const res = await fetch("/api/classes");
        if (res.ok) {
          const data = await res.json();
          classes = data.classes || [];
        }
      } catch (_) {}
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const text = input.value.trim();
      if (!text) return;

      sendBtn.disabled = true;
      addUserBubble(text);
      input.value = "";
      input.style.height = "auto";

      try {
        const res = await fetch("/api/predict", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ text }),
        });
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.detail || res.statusText);
        }
        const data = await res.json();
        data._id = Date.now();
        if (data.classes?.length) classes = data.classes;
        addBotBubble(data);
      } catch (err) {
        const el = document.createElement("div");
        el.className = "msg bot";
        el.innerHTML = `<div class="label">Error</div><p class="error">${escapeHtml(String(err.message || err))}</p>`;
        chat.appendChild(el);
      } finally {
        sendBtn.disabled = false;
        input.focus();
      }
    });

    loadClasses();
    input.focus();
  </script>
</body>
</html>
